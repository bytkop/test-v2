<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axioma Platform</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #161618;
            --accent: #ffffff;
            --border: rgba(255,255,255,0.08);
            --text: #efefef;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }

        .screen { display: none; width: 100%; height: 100%; }
        .active { display: flex; }

        #auth { align-items: center; justify-content: center; background: radial-gradient(circle at center, #1a1a1c 0%, #0a0a0a 100%); }
        .auth-box { background: var(--panel); border: 1px solid var(--border); padding: 50px; border-radius: 32px; width: 400px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 16px; margin: 10px 0; background: #000; border: 1px solid var(--border); border-radius: 14px; color: #fff; outline: none; transition: 0.2s; }
        input:focus { border-color: #444; }

        .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; cursor: pointer; font-weight: 600; margin-top: 15px; transition: 0.2s; }
        .primary { background: var(--accent); color: #000; }
        .primary:hover { opacity: 0.9; }
        .secondary { background: transparent; color: #666; font-size: 14px; }

        .sidebar { width: 300px; background: #000; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px; }
        .main { flex: 1; display: flex; flex-direction: column; position: relative; }

        .chat { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .m { max-width: 80%; padding: 14px 20px; border-radius: 20px; font-size: 15px; position: relative; }
        .m.user { align-self: flex-end; background: #222; border: 1px solid var(--border); border-bottom-right-radius: 4px; }
        .m.admin { align-self: flex-start; background: var(--accent); color: #000; border-bottom-left-radius: 4px; }
        
        .u-name { display: block; font-size: 10px; margin-bottom: 4px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; }

        .input-wrap { padding: 30px 50px; }
        .input-area { background: #161618; border: 1px solid var(--border); border-radius: 24px; padding: 12px 20px; display: flex; align-items: center; }
        textarea { flex: 1; background: transparent; border: none; color: #fff; resize: none; outline: none; font-size: 16px; padding: 10px 0; }

        .p-btn { position: absolute; top: 30px; right: 30px; background: var(--panel); border: 1px solid var(--border); padding: 10px 20px; border-radius: 40px; font-size: 13px; cursor: pointer; z-index: 10; }
        .admin-badge { background: #ff453a; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 9px; margin-left: 8px; vertical-align: middle; }
    </style>
</head>
<body>

    <div id="auth" class="screen active">
        <div class="auth-box">
            <h2 style="margin-bottom: 30px; letter-spacing: -1px; font-size: 28px;">Axioma HQ</h2>
            <input type="text" id="u" placeholder="Username">
            <input type="password" id="p" placeholder="Password">
            <button class="btn primary" onclick="auth('login')">Sign In</button>
            <button class="btn secondary" onclick="auth('register')">Create Account</button>
        </div>
    </div>

    <div id="app" class="screen">
        <div class="sidebar">
            <h1 style="font-size: 20px; font-weight: 700;">AXIOMA</h1>
            <div style="margin-top: auto; color: #444; font-size: 12px;">v1.0.4 Premium Access</div>
        </div>
        <div class="main">
            <div class="p-btn" id="p-info">User</div>
            <div class="chat" id="flow"></div>
            <div class="input-wrap">
                <div class="input-area">
                    <textarea id="msg" placeholder="Message to support..." rows="1"></textarea>
                    <button onclick="send()" style="background:none; border:none; color:#fff; cursor:pointer; margin-left:15px;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let session = null;
        const BASE = "https://твой_логин.pythonanywhere.com";

        async function auth(mode) {
            const username = document.getElementById('u').value;
            const password = document.getElementById('p').value;
            const r = await fetch(`${BASE}/${mode}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const d = await r.json();
            if (d.id || d.success) {
                session = d;
                document.getElementById('auth').classList.remove('active');
                document.getElementById('app').classList.add('active');
                document.getElementById('p-info').innerHTML = d.username + (d.role === 'admin' ? '<span class="admin-badge">ADMIN</span>' : '');
                sync();
                setInterval(sync, 3000);
            }
        }

        async function send() {
            const el = document.getElementById('msg');
            const text = el.value.trim();
            if (!text) return;
            await fetch(`${BASE}/send`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: session.id, text: text})
            });
            el.value = '';
            sync();
        }

        async function sync() {
            const r = await fetch(`${BASE}/messages`);
            const msgs = await r.json();
            const f = document.getElementById('flow');
            f.innerHTML = msgs.map(m => `
                <div class="m ${m.role === 'admin' ? 'admin' : 'user'}">
                    <span class="u-name">${m.username}</span>
                    ${m.text}
                </div>
            `).join('');
            f.scrollTop = f.scrollHeight;
        }

        const tx = document.getElementById('msg');
        tx.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
